# Compose — PRODUCTION
# Uso:
#   cd environment/production
#   docker compose up --build -d

name: miso4104-prod

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: production
    image: miso4104-angular:prod
    container_name: miso4104-angular-prod
    env_file:
      - .env
    ports:
      - '${PORT:-4000}:4000'
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:'+(process.env.PORT||4000)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
