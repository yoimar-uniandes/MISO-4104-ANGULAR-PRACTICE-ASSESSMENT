<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GhQuerry</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <meta
      name="description"
      content="Plataforma académica para explorar developers y repositorios de GitHub. GhQuerry, un proyecto del curso MISO-4104 de la Universidad de los Andes."
    />
    <meta name="author" content="MISO-4104, Universidad de los Andes" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#191916" />

    <!-- ── Open Graph (WhatsApp, Telegram, LinkedIn, Facebook) ─────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GhQuerry" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:title" content="GhQuerry" />
    <meta
      property="og:description"
      content="Plataforma académica para explorar developers y repositorios de GitHub."
    />
    <meta
      property="og:url"
      content="https://yoimar-uniandes.github.io/MISO-4104-ANGULAR-PRACTICE-ASSESSMENT/"
    />
    <meta
      property="og:image"
      content="https://yoimar-uniandes.github.io/MISO-4104-ANGULAR-PRACTICE-ASSESSMENT/favicon.png"
    />
    <meta property="og:image:alt" content="GhQuerry" />

    <!-- ── Twitter (X) Cards ───────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GhQuerry" />
    <meta
      name="twitter:description"
      content="Plataforma académica para explorar developers y repositorios de GitHub."
    />
    <meta
      name="twitter:image"
      content="https://yoimar-uniandes.github.io/MISO-4104-ANGULAR-PRACTICE-ASSESSMENT/favicon.png"
    />
    <meta name="twitter:image:alt" content="GhQuerry" />

    <!-- Canonical: el AppMeta service lo actualiza por ruta en runtime -->
    <link
      rel="canonical"
      href="https://yoimar-uniandes.github.io/MISO-4104-ANGULAR-PRACTICE-ASSESSMENT/"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
