<div class="search-input__wrap">
  <svg class="search-input__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path
      d="M10 4a6 6 0 1 0 3.74 10.7l4.78 4.78 1.41-1.41-4.78-4.78A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"
      fill="currentColor"
    />
  </svg>
  <input
    class="search-input__control"
    type="search"
    autocomplete="off"
    spellcheck="false"
    [id]="resolvedId()"
    [value]="value()"
    [placeholder]="placeholder()"
    [attr.aria-label]="ariaLabel()"
    (input)="onInput($event)"
  />
  @if (value().length > 0) {
    <button
      type="button"
      class="search-input__clear"
      (click)="onClear()"
      aria-label="Borrar búsqueda"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M18 6 6 18M6 6l12 12"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
  }
</div>
